name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GitHub Pages build (base = /pufferone/)
      - name: Build for GitHub Pages
        run: pnpm --filter @repo/web build

      - name: Copy 404.html for SPA routing
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      # Vercel build (base = /)
      - name: Rebuild for Vercel
        run: pnpm --filter @repo/web build
        env:
          GITHUB_ACTIONS: ''

      - name: Prepare Vercel deploy
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          echo '{"rewrites":[{"source":"/((?!api/).*)", "destination":"/index.html"}]}' > apps/web/dist/vercel.json
          mkdir -p apps/web/dist/.vercel
          echo '{"projectId":"prj_fFfiPoZo64hpbdAbidPBcIBC5tpd","orgId":"team_193Luvf7v6yBoueoO7lPgwkR"}' > apps/web/dist/.vercel/project.json

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: npx vercel deploy apps/web/dist/ --prod --yes --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
